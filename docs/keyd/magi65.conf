# /etc/keyd/magi65.conf — managed by ~/linux-dotfiles/docs/keyd/
#
# IQUNIX Magi65 Pro ONLY.
#
# Why this exists: the board's CapsLock is rebound to Escape in firmware
# (VIA), so keyd never sees a `capslock` keycode from it — only `esc`.
# The global `capslock = overload(control, esc)` in default.conf therefore
# never fires on this board, which is why hold=Ctrl / tap=Esc worked on the
# laptop keyboard but not here. Fix: overload `esc` itself for this device.

[ids]
# "IQUNIX MG65 BT3 Keyboard" over Bluetooth. The k: prefix matches only the
# keyboard interface — the same vendor:product id also exposes a mouse
# interface ("IQUNIX MG65 BT3 Mouse") which keyd must not grab.
#
# WARNING: this id is specific to the Bluetooth connection. Wired or 2.4GHz
# dongle mode presents a different id — run `sudo keyd monitor` and add the
# new id below if you switch modes.
k:245a:8276

[main]

# Covers the case where the firmware CapsLock→Esc remap is ever removed in
# VIA. MUST live here (not rely on default.conf): keyd assigns each device to
# exactly ONE config file — explicit id beats the wildcard.
capslock = overload(control, esc)

# Hold = Control, tap = Escape — restores on this board what capslock does
# everywhere else via default.conf.
#
# Side effect: the board's real Esc key gets the same overload (tap still
# Esc, but holding Esc acts as Ctrl). Unavoidable at the evdev level —
# firmware sends esc for the physical CapsLock key, so the two are
# indistinguishable to keyd. If that ever bothers you, revert the CapsLock
# remap in VIA instead and delete this file; the global capslock overload
# will then handle the board like any other keyboard.
esc = overload(control, esc)
