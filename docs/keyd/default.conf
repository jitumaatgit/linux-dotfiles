# /etc/keyd/default.conf — managed by ~/linux-dotfiles/docs/keyd/
#
# Apply:   sudo ~/linux-dotfiles/docs/keyd/apply.sh
#          (installs every *.conf from this repo into /etc/keyd/ and restarts keyd)
#
# Layout:
#   default.conf (this file) — bindings for ALL keyboards ([ids] *).
#   laptop.conf              — Dell Latitude 7450 internal keyboard only.
#   magi65.conf              — IQUNIX Magi65 Pro only.
# A device gets the union of every file whose [ids] match it; no key is bound
# in two files for the same device, so merge precedence never comes into play.
#
# Why keyd: it sits at the evdev layer (below niri's xkb block, below XKB,
# below any compositor IME), so a binding here is the lowest practical level
# without patching the kernel.

[ids]
# Match every keyboard keyd identifies as such (AT keyboard + BT MG65).
# Per-device overrides live in the sibling files listed above.
*

[main]

# CapsLock: hold = Control, tap = Escape.
# Works in every VT, DE, and compositor because keyd rewrites the evdev
# stream before any userspace sees it. Side effect: the CapsLock LED no
# longer lights, because keyd eats the CapsLock toggle before the kernel
# led driver sees it. That is the expected success indicator.
#
# NOTE: on the Magi65 Pro this never fires — its CapsLock is firmware-remapped
# to Escape (VIA), so the board sends esc, not capslock. See magi65.conf.
capslock = overload(control, esc)
