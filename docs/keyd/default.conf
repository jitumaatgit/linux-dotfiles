# /etc/keyd/default.conf — managed by ~/linux-dotfiles/docs/keyd/
#
# Apply:   sudo ~/linux-dotfiles/docs/keyd/apply.sh
#          (copies this file to /etc/keyd/default.conf and restarts keyd)
#
# Why this exists:
#   - The previous file used "[Global]" (capital G). keyd section names are
#     lowercase; an unknown header is parsed as a layer name, so `default = main`
#     was silently dropped and keyd never applied any binding. Result: capstock
#     toggled capitalisation and lit the LED — i.e. default kernel behaviour,
#     because keyd wasn't intercepting anything.
#   - keyd requires an [ids] section as the FIRST section of any config; the old
#     file had none, so even if the headers had been correct it would have been
#     ignored.
#   - keyd sits at the evdev layer (below niri's xkb block, below XKB, below any
#     compositor IME), so a binding here is the lowest practical level without
#     patching the kernel.

[ids]
# Match every keyboard keyd identifies as such (AT keyboard + BT MG65).
# Exclude mice explicitly via -<id> if they get misclassified later.
*

[main]

# CapsLock: hold = Control, tap = Escape.
# Works in every VT, DE, and compositor because keyd rewrites the evdev
# stream before any userspace sees it. Side effect: the CapsLock LED no
# longer lights, because keyd eats the CapsLock toggle before the kernel
# led driver sees it. That is the expected success indicator.
capslock = overload(control, esc)

# Modifier remaps: Mac-style layout on the Dell Latitude 7450.
#
# Right Alt → Control.
# Left Alt  → Meta/Super (for niri compositor shortcuts).
# Windows   → Alt (the key left of leftalt; firmware identifies it as leftmeta).
#
# These are simple layer bindings in [main]. keyd evaluates chords FIRST
# (on physical key names, pre-remap), so the Copilot chord below is unaffected
# by remapping leftmeta here — the chord swallows the physical leftmeta before
# the individual binding ever fires.
rightalt = layer(control)
leftalt = layer(meta)
leftmeta = layer(alt)

# Microsoft "Copilot" key -> Alt, via a chord binding.
#
# Captured 2026-07-22 via `sudo evtest /dev/input/event13` (keyd's virtual
# keyboard): pressing the Copilot key fires `leftmeta down → leftshift down →
# f23 down` all within ~600μs, and the firmware sends them as real physical
# keydowns, not as modifiers of f23. A plain `f23 = layer(alt)` remap would
# leak the firmware-provided meta+shift chord to apps, because the physical
# keydowns reach the virtual keyboard before f23 arrives.
#
# Fix: keyd's *chord* mechanism (see keyd(1) §Chords, default 50ms window).
# A binding whose LHS is `key1+key2+key3` fires only when ALL three keys are
# depressed within chord_timeout; when it fires, keyd treats the three keys
# as a single unit AND EMITS ONLY the bound action, swallowing the individual
# physical keydowns. The firmware's sub-millisecond cadence is far inside the
# 50ms window; real user Meta+Shift+<other> combos don't match (they lack f23).
leftmeta+leftshift+f23 = layer(alt)
