# /etc/systemd/system/keyd.service.d/restart.conf — managed by ~/linux-dotfiles/docs/keyd/
#
# The stock keyd.service has no Restart=, so when keyd exits (e.g. a Bluetooth
# keyboard flaps and keyd hits "write: No such device" on the stale node),
# ALL remapping on EVERY keyboard silently dies until manually restarted.
# Restart it; it's the system-wide input path.
[Service]
Restart=on-failure
RestartSec=1
